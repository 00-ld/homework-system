# fly.toml - Fly.io 部署配置
# 首次部署前先运行: flyctl launch --no-deploy
# 然后: flyctl volumes create data --size 1
# 最后: flyctl deploy

app = "homework-system"

[build]
  dockerfile = "Dockerfile"

[env]
  HOMEWORK_DATA_DIR = "/data"

[[services]]
  protocol = "tcp"
  internal_port = 8000

  [[services.ports]]
    port = 80
    handlers = ["http"]
    force_https = true

  [[services.ports]]
    port = 443
    handlers = ["tls", "http"]

  [[services.concurrency]]
    hard_limit = 25
    soft_limit = 10
    type = "connections"

[[mounts]]
  source = "data"
  destination = "/data"
